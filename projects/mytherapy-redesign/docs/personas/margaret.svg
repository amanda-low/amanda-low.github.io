<svg xmlns="http://www.w3.org/2000/svg" viewBox="62 66 236 236" role="img" aria-label="Illustration of Margaret, a 58-year-old woman with silver hair and glasses, sitting calmly with both hands cradling a cup of tea. Hand-drawn line work, coral cardigan, cream circle background.">
  <defs>
    <clipPath id="margaretCircle">
      <circle cx="180" cy="190" r="118"/>
    </clipPath>
  </defs>

  <!-- circle background -->
  <circle cx="180" cy="190" r="118" fill="#FBF7EE"/>

  <!-- everything inside the circle -->
  <g clip-path="url(#margaretCircle)">

    <!-- ============== Body / clothing ============== -->
    <!-- coral cardigan torso -->
    <path d="M 132 220
             Q 132 198 148 188
             L 218 188
             Q 234 198 234 220
             L 232 290
             Q 220 296 184 296
             Q 148 296 134 290
             Z"
          fill="#E26B5C" stroke="#3A2417" stroke-width="1.7" stroke-linejoin="round"/>

    <!-- ============== Arms ============== -->
    <!-- Left arm fill -->
    <path d="M 132 218
             Q 116 246 140 276
             Q 150 282 156 278
             Q 156 250 152 222
             Z"
          fill="#E26B5C" stroke="none"/>

    <!-- Left arm outline (open, no top edge) -->
    <path d="M 132 218
             Q 116 246 140 276
             Q 150 282 156 278
             Q 156 250 152 222"
          fill="none" stroke="#3A2417" stroke-width="1.7"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Right arm fill (mirror) -->
    <path d="M 234 218
             Q 250 246 226 276
             Q 216 282 210 278
             Q 210 250 214 222
             Z"
          fill="#E26B5C" stroke="none"/>

    <!-- Right arm outline -->
    <path d="M 234 218
             Q 250 246 226 276
             Q 216 282 210 278
             Q 210 250 214 222"
          fill="none" stroke="#3A2417" stroke-width="1.7"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- ============== Teacup ============== -->
    <g>
      <ellipse cx="183" cy="290" rx="26" ry="4"
               fill="#FBF7EE" stroke="#3A2417" stroke-width="1.5"/>
      <path d="M 162 262
               Q 162 286 183 288
               Q 204 286 204 262 Z"
            fill="#FBF7EE" stroke="#3A2417" stroke-width="1.6"
            stroke-linejoin="round"/>
      <ellipse cx="183" cy="262" rx="21" ry="3"
               fill="#FBF7EE" stroke="#3A2417" stroke-width="1.4"/>
      <g stroke="#3A2417" stroke-width="1.3" fill="none"
         stroke-linecap="round" opacity="0.45">
        <path d="M 174 254 q 4 -8 0 -16"/>
        <path d="M 184 252 q 4 -8 0 -18"/>
        <path d="M 194 254 q 4 -8 0 -16"/>
      </g>
    </g>

    <!-- ============== Hands cupping the sides of the cup ============== -->
    <path d="M 152 274
             Q 156 268 164 270
             Q 170 274 168 282
             Q 162 287 154 285
             Q 149 281 152 274 Z"
          fill="#F0CDB0" stroke="#3A2417" stroke-width="1.4"
          stroke-linejoin="round"/>

    <path d="M 214 274
             Q 210 268 202 270
             Q 196 274 198 282
             Q 204 287 212 285
             Q 217 281 214 274 Z"
          fill="#F0CDB0" stroke="#3A2417" stroke-width="1.4"
          stroke-linejoin="round"/>

    <!-- ============== Head and hair ============== -->
    <!-- silver hair back layer -->
    <path d="M 138 134
             Q 138 96 184 92
             Q 230 96 230 138
             L 230 168
             Q 224 162 218 168
             Q 214 158 206 158
             L 162 158
             Q 154 158 150 168
             Q 144 162 138 168 Z"
          fill="#C8BBB0" stroke="#3A2417" stroke-width="1.6" stroke-linejoin="round"/>

    <!-- face oval -->
    <ellipse cx="184" cy="148" rx="36" ry="40"
             fill="#F0CDB0" stroke="#3A2417" stroke-width="1.5"/>

    <!-- silver hair front layer / fringe -->
    <path d="M 150 132
             Q 156 110 184 108
             Q 212 110 218 132
             Q 208 124 192 130
             Q 184 134 176 130
             Q 162 124 150 132 Z"
          fill="#C8BBB0" stroke="#3A2417" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- blush -->
    <ellipse cx="160" cy="160" rx="6" ry="3.6" fill="#E8A89A" opacity="0.55"/>
    <ellipse cx="208" cy="160" rx="6" ry="3.6" fill="#E8A89A" opacity="0.55"/>

    <!-- glasses -->
    <g stroke="#3A2417" stroke-width="1.6" fill="none" stroke-linecap="round">
      <rect x="150" y="138" width="22" height="16" rx="5" ry="5"/>
      <rect x="196" y="138" width="22" height="16" rx="5" ry="5"/>
      <line x1="172" y1="146" x2="196" y2="146"/>
      <line x1="150" y1="142" x2="143" y2="140"/>
      <line x1="218" y1="142" x2="225" y2="140"/>
    </g>

    <!-- gentle eyes -->
    <path d="M 156 148 q 4 3 8 0" stroke="#3A2417" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 202 148 q 4 3 8 0" stroke="#3A2417" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- soft smile -->
    <path d="M 174 172 q 10 6 20 0" stroke="#3A2417" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  </g>
</svg>
